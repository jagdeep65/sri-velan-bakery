<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Velan - Admin Dashboard</title>
    <!-- Tailwind CSS for clean layout grid and utility spacing -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Font Awesome for UI icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-8">
        <!-- GLOBAL DASHBOARD HEADER -->
        <header class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
            <div>
                <h1 class="text-xl font-black text-gray-900 uppercase">Sri Velan Store Management</h1>
                <p class="text-xs text-gray-500 font-semibold">Live Realtime Dashboard Hub</p>
            </div>
            <div class="text-right">
                <span id="sync-status" class="text-[10px] bg-green-100 text-green-800 font-bold px-3 py-1 rounded-full uppercase tracking-wider">Cloud Connected</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- LEFT PANEL: INVENTORY & CATALOG MANAGER -->
            <div class="bg-white p-5 rounded-xl shadow-sm border lg:col-span-1 space-y-4">
                <h3 class="font-extrabold text-gray-900 uppercase text-sm border-b pb-2">Create New Item Configuration</h3>
                
                <!-- Product Creation Form -->
                <form id="inventory-form" class="space-y-3 text-xs" onsubmit="handleProductCreation(event)">
                    <div class="space-y-1">
                        <label class="block font-bold text-gray-700">Item Presentation Name</label>
                        <input type="text" id="prod-name" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="space-y-1">
                            <label class="block font-bold text-gray-700">Display Price (₹)</label>
                            <input type="number" id="prod-original" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block font-bold text-gray-700">Offer Price (₹)</label>
                            <input type="number" id="prod-discount" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="block font-bold text-gray-700">Item Image (Direct URL)</label>
                        <input type="url" id="prod-img" required class="w-full p-2 border rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500" placeholder="https://images.unsplash.com/...">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg uppercase tracking-wider transition-all shadow-sm">Commit Configuration</button>
                </form>

                <h3 class="font-extrabold text-gray-900 uppercase text-xs pt-4 border-t">Current Live Catalog</h3>
                <!-- Container for listing current products -->
                <div id="admin-catalog-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
            </div>

            <!-- RIGHT PANEL: INCOMING ACTIVE ORDERS STREAM -->
            <div class="bg-white p-5 rounded-xl shadow-sm border lg:col-span-2 space-y-4">
                <h3 class="font-extrabold text-gray-900 uppercase text-sm border-b pb-2">Active Live Order Processing Stream</h3>
                <!-- Container for streaming user orders -->
                <div id="admin-orders-stream" class="space-y-4 max-h-[600px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <!-- ENGINE SCRIPTS -->
    <script>
        // Realtime Database Link Configuration
        const FIREBASE_DB_URL = "https://sri-velan-bakery-default-rtdb.firebaseio.com";

        let localCatalog = {};
        let activeOrders = {};

        // Fetch current catalog and active streaming orders from Firebase Node
        async function fetchSystemDataMatrix() {
            const statusLabel = document.getElementById("sync-status");
            statusLabel.className = "text-[10px] bg-yellow-100 text-yellow-800 font-bold px-3 py-1 rounded-full uppercase tracking-wider animate-pulse";
            statusLabel.innerText = "Syncing...";
            
            try {
                // Fetch catalog inventory nodes
                const invRes = await fetch(`${FIREBASE_DB_URL}/inventory.json`);
                localCatalog = await invRes.json() || {};

                // Fetch incoming order payloads
                const ordRes = await fetch(`${FIREBASE_DB_URL}/orders.json`);
                activeOrders = await ordRes.json() || {};

                renderAdminCatalogPanel();
                renderAdminOrdersStream();
                
                statusLabel.className = "text-[10px] bg-green-100 text-green-800 font-bold px-3 py-1 rounded-full uppercase tracking-wider";
                statusLabel.innerText = "Cloud Synced";
            } catch (err) {
                statusLabel.className = "text-[10px] bg-red-100 text-red-800 font-bold px-3 py-1 rounded-full uppercase tracking-wider";
                statusLabel.innerText = "Sync Offline";
            }
        }

        // Handle addition of new food/sweet profiles into global distribution
        async function handleProductCreation(e) {
            e.preventDefault();
            const id = Date.now();
            const payload = {
                id: id,
                name: document.getElementById("prod-name").value,
                originalPrice: parseInt(document.getElementById("prod-original").value),
                discountPrice: parseInt(document.getElementById("prod-discount").value),
                image: document.getElementById("prod-img").value,
                isSoldOut: false
            };

            await fetch(`${FIREBASE_DB_URL}/inventory/${id}.json`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            document.getElementById("inventory-form").reset();
            fetchSystemDataMatrix();
        }

        // Toggle stock visibility tags globally
        async function toggleSoldOutStatus(id, currentStatus) {
            await fetch(`${FIREBASE_DB_URL}/inventory/${id}/isSoldOut.json`, {
                method: 'PUT',
                body: JSON.stringify(!currentStatus)
            });
            fetchSystemDataMatrix();
        }

        // Delete items out of the system catalog tree permanently
        async function purgeCatalogItem(id) {
            if(!confirm("Remove item permanently from phone storefront?")) return;
            await fetch(`${FIREBASE_DB_URL}/inventory/${id}.json`, { method: 'DELETE' });
            fetchSystemDataMatrix();
        }

        // Set customer orders to completed status to archive active view cards
        async function updateOrderState(firebaseKey, nextStatus) {
            await fetch(`${FIREBASE_DB_URL}/orders/${firebaseKey}/status.json`, {
                method: 'PUT',
                body: JSON.stringify(nextStatus)
            });
            fetchSystemDataMatrix();
        }

        // Generate UI items on the inventory status manager sub-desk
        function renderAdminCatalogPanel() {
            const container = document.getElementById("admin-catalog-list");
            container.innerHTML = "";
            
            Object.keys(localCatalog).forEach(key => {
                const item = localCatalog[key];
                if (!item) return;
                const row = document.createElement("div");
                row.className = "bg-gray-50 p-2 rounded-lg border flex items-center justify-between text-xs font-semibold text-gray-800";
                row.innerHTML = `
                    <div class="truncate max-w-[140px]">
                        <p class="truncate uppercase font-bold text-gray-900">${item.name}</p>
                        <p class="text-[10px] text-gray-500">₹${item.discountPrice}</p>
                    </div>
                    <div class="flex items-center space-x-1">
                        <button onclick="toggleSoldOutStatus(${item.id}, ${item.isSoldOut})" class="px-2 py-1 rounded text-[10px] uppercase font-bold text-white ${item.isSoldOut ? 'bg-red-500' : 'bg-green-600'}">${item.isSoldOut ? 'Sold' : 'Live'}</button>
                        <button onclick="purgeCatalogItem(${item.id})" class="p-1 text-gray-400 hover:text-red-600 text-[11px]"><i class="fa-solid fa-trash"></i> Delete</button>
                    </div>`;
                container.appendChild(row);
            });
        }

        // Generate full order tickets inside the live center monitoring grid
        function renderAdminOrdersStream() {
            const container = document.getElementById("admin-orders-stream");
            container.innerHTML = "";

            const sortedKeys = Object.keys(activeOrders).reverse();

            if (sortedKeys.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-12 text-xs font-bold uppercase">No active orders placed yet.</p>`;
                return;
            }

            sortedKeys.forEach(key => {
                const order = activeOrders[key];
                if (!order) return;
                
                const card = document.createElement("div");
                card.className = `p-4 rounded-xl border-2 bg-white transition-all space-y-3 ${order.status === 'completed' ? 'border-gray-200 opacity-60' : 'border-blue-400 shadow-sm'}`;
                
                let itemsListHtml = order.items.map(i => `<li class="flex justify-between"><span>• ${i.name}</span><span>×${i.qty}</span></li>`).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-start border-b pb-2">
                        <div>
                            <span class="text-[9px] font-bold bg-gray-100 text-gray-800 px-2 py-0.5 rounded uppercase tracking-wider">ID: ${order.id}</span>
                            <h4 class="font-extrabold text-gray-900 uppercase text-xs mt-1">Mode: ${order.method} via [${order.payment}]</h4>
                        </div>
                        <div class="text-right">
                            <span class="text-sm font-black text-gray-900">₹${order.totalPayable}</span>
                            <p class="text-[9px] text-gray-400 mt-0.5">${new Date(order.timestamp).toLocaleTimeString()}</p>
                        </div>
                    </div>
                    <div class="text-xs text-gray-700 space-y-2">
                        <div class="bg-gray-50 p-2.5 rounded-lg border">
                            <p class="font-bold text-[10px] text-gray-500 uppercase tracking-wide">Customer Order Details</p>
                            <ul class="mt-1 font-semibold space-y-0.5">${itemsListHtml}</ul>
                        </div>
                        <p class="font-semibold text-gray-600"><span class="font-bold text-gray-900">Address:</span> ${order.address}</p>
                    </div>
                    <div class="flex justify-between items-center pt-1 border-t">
                        <span class="text-[10px] font-bold uppercase ${order.status === 'completed' ? 'text-gray-500' : 'text-blue-600 animate-pulse'}">Status: ${order.status}</span>
                        ${order.status !== 'completed' ? `
                            <button onclick="updateOrderState('${key}', 'completed')" class="bg-green-600 hover:bg-green-700 text-white font-bold text-[10px] px-4 py-1.5 rounded-lg uppercase tracking-wider transition-all shadow-sm">Complete Order</button>
                        ` : ''}
                    </div>`;
                container.appendChild(card);
            });
        }

        // Automatic polling updates run every 5 seconds to match updates smoothly
        setInterval(fetchSystemDataMatrix, 5000);
        document.addEventListener("DOMContentLoaded", fetchSystemDataMatrix);
    </script>
</body>
</html>
